name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import smoke test
        run: |
          python -c "import packrat, packrat.cli, packrat.store, packrat.archive, packrat.tui, packrat.images; print('import OK', packrat.__version__)"

      - name: CLI loads
        run: packrat --version

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
